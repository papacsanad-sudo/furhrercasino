<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FurtherCasino - Karbantartás</title>
    <style>
        /* CSS STÍLUSOK (DESIGN) */
        :root {
            --bg: #0d1117;
            --bg2: #161b22;
            --bg3: #21262d;
            --border: #30363d;
            --border2: #484f58;
            --text: #c9d1d9;
            --text2: #8b949e;
            --gold: #f5c518;
            --gold-glow: rgba(245, 197, 24, 0.3);
            --radius: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Fejléc */
        .menu-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .menu-title {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .menu-title span { color: var(--gold); }

        .maintenance-badge {
            display: inline-block;
            background: rgba(245, 197, 24, 0.1);
            color: var(--gold);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.8rem;
            border: 1px solid var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Időzítő Panel */
        .timer-panel {
            background: var(--bg2);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .timer-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .timer-label {
            color: var(--text2);
            font-size: 0.95rem;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .timer-display {
            font-size: 4rem;
            font-weight: 900;
            color: var(--gold);
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 25px var(--gold-glow);
            margin: 10px 0;
        }

        /* Újdonságok Szekció */
        .game-header {
            text-align: center;
            margin-bottom: 22px;
        }

        .updates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        .update-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            cursor: default;
        }

        .update-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .game-icon { font-size: 2.2rem; margin-bottom: 12px; display: block; }

        .game-name {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: #fff;
        }

        .game-desc {
            font-size: 0.85rem;
            color: var(--text2);
            line-height: 1.5;
        }

        .game-tag {
            background: var(--gold);
            color: #000;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            display: inline-block;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .timer-display { font-size: 2.8rem; }
            .menu-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Fejléc -->
        <div class="menu-header">
            <h1 class="menu-title">FURHER<span>CASINO</span></h1>
            <div class="maintenance-badge">KARBANTARTÁS ALATT</div>
        </div>

        <!-- Időzítő Panel -->
        <div class="timer-panel">
            <div class="timer-label">Várható befejezés:</div>
            <div id="countdown" class="timer-display">Majd egyszer ha kész lesz.</div>
            <p class="game-desc" style="color: var(--gold); font-weight: 600;">Várj türelemmel!</p>
        </div>

        <!-- Újdonságok Szekció -->
        <div class="game-header">
            <h2 class="game-name" style="font-size: 1.5rem; margin-bottom: 5px;">Mik lesznek az újdonságok?</h2>
            <p style="color: var(--text2); font-size: 0.9rem; margin-bottom: 20px;">Nézd meg mi vár rád az új verzióban: ADATBÁZIS MINDENED EL FOG VESZNI!!</p>
        </div>
    <script>
    if (!sessionStorage.getItem("reloaded")) {
        sessionStorage.setItem("reloaded", "true");
        location.reload(true);
    }
</script>
</body>
</html>
