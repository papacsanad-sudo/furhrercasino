<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>FurtherCasino - Karbantartás</title>

    <script>
        (function() {
            if (!sessionStorage.getItem("forced_refresh_v2")) {
                sessionStorage.setItem("forced_refresh_v2", "true");
                window.location.reload(true);
            }
        })();
    </script>

    <style>
        :root {
            --bg: #0a0c10;
            --panel-bg: rgba(22, 27, 34, 0.8);
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --gold: #ffcc00;
            --gold-glow: rgba(255, 204, 0, 0.4);
            --danger: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 20%, #1c2128 0%, var(--bg) 80%);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Fejléc */
        .menu-header {
            margin-bottom: 40px;
        }

        .menu-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-title span {
            background: linear-gradient(to bottom, var(--gold), #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--gold-glow));
        }

        .maintenance-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 204, 0, 0.1);
            color: var(--gold);
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.75rem;
            border: 1px solid rgba(255, 204, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .maintenance-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Panel */
        .timer-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 50px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            position: relative;
        }

        .timer-label {
            color: var(--text-dim);
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .timer-display {
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: 800;
            color: #fff;
            margin: 10px 0;
            font-variant-numeric: tabular-nums;
        }

        .warning-box {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255, 77, 77, 0.05);
            border-left: 3px solid var(--danger);
            border-radius: 8px;
            text-align: left;
        }

        .warning-text {
            color: var(--danger);
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .footer-note {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-top: 20px;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="menu-header">
            <h1 class="menu-title">FURTHER<span>CASINO</span></h1>
            <div class="maintenance-badge">Maintenance break</div>
        </div>

        <div class="timer-panel">
            <div class="timer-label">Várható befejezés</div>
            <div class="timer-display">18:00 – 19:00 óra</div>
            
            <div class="warning-box">
                <p class="warning-text">⚠️ Fontos figyelmeztetés</p>
                <p style="font-size: 0.85rem; color: var(--text-dim); margin-top: 5px;">
                    Az új verzióra való átállás miatt az adatbázis törlésre kerül. Minden korábbi egyenleg és battle pass level nullázódik.
                </p>
            </div>
        </div>

        <p class="footer-note">Várk türelemmel!</p>
    </div>

</body>
</html>
